# Cloudflare Tunnel configuration — TEMPLATE (no secrets).
#
# Copy to /etc/cloudflared/config.yml and replace <TUNNEL_UUID>.
# The credentials JSON is produced by `cloudflared tunnel create` and must NOT
# be committed (see .gitignore). See docs/runbook.md for the full bring-up.

tunnel: <TUNNEL_UUID>
credentials-file: /etc/cloudflared/<TUNNEL_UUID>.json

# Optional: prefer QUIC; falls back automatically if UDP is blocked.
# protocol: quic

# Forward everything to the local Caddy proxy, which routes by Host header.
# cloudflared matches ingress rules top-down; the apex rule is listed first,
# then the wildcard (a wildcard label does not match the bare apex).
ingress:
  - hostname: connorcantrell.com
    service: http://localhost:80
  - hostname: "*.connorcantrell.com"
    service: http://localhost:80
  # Required: every ingress list MUST end with a catch-all.
  - service: http_status:404
