<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>Connor Cantrell</title>
	<meta name="description" content="Connor Cantrell">
	<link rel="stylesheet" href="/styles.css">
</head>
<body>
	<div id="world">
		<section class="screen" data-node="name">
			<div class="inner">
				<h1>Connor Cantrell</h1>
				<p class="eyebrow hero-hint">swipe to explore</p>
			</div>
		</section>

		<section class="screen" data-node="about">
			<div class="inner">
				<p class="eyebrow">About</p>
				<h2>Hello.</h2>
				<p>A short introduction goes here &mdash; who you are and what you care about.</p>
			</div>
		</section>

		<section class="screen" data-node="professional">
			<div class="inner">
				<p class="eyebrow">Professional background</p>
				<h2>What I do</h2>
				<p>Roles, work, and the things you&rsquo;ve built.</p>
			</div>
		</section>

		<section class="screen" data-node="story">
			<div class="inner">
				<p class="eyebrow">My story</p>
				<h2>How I got here</h2>
				<p>The journey that led you to where you are today.</p>
			</div>
		</section>
	</div>

	<svg id="map" aria-hidden="true"></svg>

	<div id="hints" aria-hidden="true">
		<span class="hint up"></span>
		<span class="hint down"></span>
		<span class="hint left"></span>
		<span class="hint right"></span>
	</div>

	<script src="/app.js"></script>
</body>
</html>
