# microSD hardening: keep the systemd journal in RAM instead of writing it to
# the SD card continuously (mitigates flash wear + power-loss corruption).
#
# Deploy to: /etc/systemd/journald.conf.d/volatile.conf
# Apply:     sudo systemctl restart systemd-journald
#
# Trade-off: logs do not survive a reboot. Pair with log2ram if you also want
# /var/log app logs kept off the card. Revisit if you migrate to NVMe.

[Journal]
Storage=volatile
RuntimeMaxUse=64M
